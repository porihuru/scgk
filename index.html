<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>showcogaku</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap');
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent
    }

    :root {
        --bg: #fff8f9;
        --surface: #fff0f3;
        --surface2: #ffe4ec;
        --border: #f9c0ce;
        --text: #3d1a24;
        --muted: #b07080;
        --accent: #e05a7a;
        --accent2: #f7a8bb;
        --green: #2d8a5e;
        --green-bg: #edf7f2;
        --green-b: #a8ddc4;
        --red: #c44060;
        --red-bg: #fdedf2;
        --red-b: #f4b8cc;
        --blue: #2a6baa;
        --blue-bg: #eaf3fb;
        --blue-b: #a8cef0;
        --amber: #c46a00;
        --amber-bg: #fff3e0;
        --amber-b: #ffc97a;
    }

    html, body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'Noto Sans JP', sans-serif;
        overflow: hidden
    }

    #lock {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #fff0f5 0%, #fce4ec 100%);
        z-index: 100;
        transition: opacity .5s ease, transform .5s ease
    }

    #lock.out {
        opacity: 0;
        transform: scale(1.04);
        pointer-events: none
    }

    .lock-deco {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: linear-gradient(135deg, #f9a8c0, #f06292);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 28px;
        box-shadow: 0 8px 24px rgba(240, 98, 146, 0.3)
    }

    .lock-deco-inner {
        width: 28px;
        height: 28px;
        border: 3px solid #fff;
        border-radius: 50%;
        position: relative
    }

    .lock-deco-inner::after {
        content: '';
        position: absolute;
        bottom: -10px;
        left: 50%;
        transform: translateX(-50%);
        width: 18px;
        height: 14px;
        border: 3px solid #fff;
        border-radius: 3px
    }

    .lock-title {
        font-size: 20px;
        font-weight: 500;
        color: #c2476b;
        letter-spacing: .08em;
        margin-bottom: 6px
    }

    .lock-sub {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: .2em;
        margin-bottom: 28px;
        font-family: 'DM Mono', monospace
    }

    .pw-wrap {
        position: relative;
        width: 240px
    }

    .pw-wrap input {
        width: 100%;
        background: #fff;
        border: 1.5px solid var(--accent2);
        border-radius: 50px;
        padding: 13px 52px 13px 20px;
        color: var(--text);
        font-size: 14px;
        outline: none;
        font-family: 'Noto Sans JP', sans-serif;
        letter-spacing: .1em;
        transition: border-color .2s;
        box-shadow: 0 2px 12px rgba(224, 90, 122, 0.1)
    }

    .pw-wrap input::placeholder {
        color: #dba0b0
    }

    .pw-wrap input:focus {
        border-color: var(--accent);
        box-shadow: 0 2px 16px rgba(224, 90, 122, 0.18)
    }

    .pw-wrap input.err {
        border-color: #e53e3e;
        animation: shake .3s ease
    }

    .pw-wrap .arrow {
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-50%);
        background: linear-gradient(135deg, #f06292, #e05a7a);
        border: none;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity .15s, transform .1s;
        box-shadow: 0 2px 8px rgba(224, 90, 122, 0.3)
    }

    .pw-wrap .arrow:hover {
        opacity: .9
    }

    .pw-wrap .arrow:active {
        transform: translateY(-50%) scale(.93)
    }

    .pw-wrap .arrow svg {
        width: 16px;
        height: 16px;
        fill: none;
        stroke: #fff;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round
    }

    .err-msg {
        color: #e53e3e;
        font-size: 12px;
        margin-top: 8px;
        text-align: center;
        height: 16px;
        font-family: 'DM Mono', monospace
    }

    @keyframes shake {
        0%, 100% {
            transform:translateX(0)
        }

        25% {
            transform:translateX(-6px)
        }

        75% {
            transform: translateX(6px)
        }
    }

    #app {
        display: none;
        height: 100%;
        flex-direction: column;
        max-width: 430px;
        margin: 0 auto
    }

    #app.show {
        display: flex
    }

    .hdr {
        padding: 52px 24px 12px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 10px
    }

    .hdr-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: linear-gradient(135deg, #f06292, #e05a7a)
    }

    .hdr-title {
        font-size: 12px;
        color: var(--muted);
        letter-spacing: .18em;
        font-family: 'DM Mono', monospace
    }

    .scroll {
        flex: 1;
        overflow-y: auto;
        padding: 0 20px 40px;
        -webkit-overflow-scrolling: touch
    }

    .scroll::-webkit-scrollbar {
        display: none
    }

    .date-card {
        background: #fff;
        border: 1.5px solid var(--border);
        border-radius: 24px;
        padding: 22px;
        margin-bottom: 16px;
        box-shadow: 0 4px 20px rgba(224, 90, 122, 0.06)
    }

    .card-label {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: .18em;
        margin-bottom: 12px;
        font-family: 'DM Mono', monospace
    }

    .date-input {
        width: 100%;
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 14px;
        padding: 13px 16px;
        color: var(--text);
        font-size: 15px;
        outline: none;
        font-family: 'Noto Sans JP', sans-serif;
        -webkit-appearance: none;
        transition: border-color .2s
    }

    .date-input:focus {
        border-color: var(--accent)
    }

    .date-input::-webkit-calendar-picker-indicator {
        cursor: pointer;
        opacity: .5
    }

    .calc-btn {
        width: 100%;
        margin-top: 12px;
        padding: 15px;
        background: linear-gradient(135deg, #f06292, #e05a7a);
        border: none;
        border-radius: 50px;
        color: #fff;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        font-family: 'Noto Sans JP', sans-serif;
        letter-spacing: .08em;
        transition: opacity .15s, transform .1s;
        box-shadow: 0 4px 16px rgba(224, 90, 122, 0.3)
    }

    .calc-btn:active {
        opacity: .88;
        transform: scale(.98)
    }

    .result {
        display: none;
        margin-bottom: 16px
    }

    .result.show {
        display: block
    }

    .result-date {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: .15em;
        margin-bottom: 12px;
        font-family: 'DM Mono', monospace;
        padding-left: 4px
    }

    .badges {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px
    }

    .badge {
        border-radius: 20px;
        padding: 18px 16px;
        border: 1.5px solid transparent
    }

    .badge.green {
        background: var(--green-bg);
        border-color: var(--green-b)
    }

    .badge.red {
        background: var(--red-bg);
        border-color: var(--red-b)
    }

    .badge.blue {
        background: var(--blue-bg);
        border-color: var(--blue-b)
    }

    .badge-side {
        font-size: 10px;
        letter-spacing: .2em;
        color: var(--muted);
        margin-bottom: 6px;
        font-family: 'DM Mono', monospace
    }

    .badge-val {
        font-size: 17px;
        font-weight: 500;
        line-height: 1.3
    }

    .badge.green .badge-val {
        color: var(--green)
    }

    .badge.red .badge-val {
        color: var(--red)
    }

    .badge.blue .badge-val {
        color: var(--blue)
    }

    .setsu-card {
        background: #fff;
        border: 1.5px solid var(--amber-b);
        border-radius: 24px;
        padding: 18px;
        margin-bottom: 16px;
        box-shadow: 0 4px 20px rgba(196, 106, 0, 0.06)
    }

    .setsu-label {
        font-size: 11px;
        color: var(--amber);
        letter-spacing: .15em;
        margin-bottom: 14px;
        font-family: 'DM Mono', monospace;
        display: flex;
        align-items: center;
        gap: 6px
    }

    .setsu-label::before {
        content: '';
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--amber);
        flex-shrink: 0
    }

    .setsu-inner {
        background: var(--surface);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 10px;
        border: 1.5px solid var(--border)
    }

    .setsu-inner .badge-side {
        font-size: 10px;
        letter-spacing: .2em;
        color: var(--muted);
        margin-bottom: 4px;
        font-family: 'DM Mono', monospace
    }

    .setsu-inner .badge-val {
        font-size: 17px;
        font-weight: 500
    }

    .setsu-inner .badge-val.green {
        color: var(--green)
    }

    .setsu-inner .badge-val.red {
        color: var(--red)
    }

    .setsu-inner .badge-val.blue {
        color: var(--blue)
    }

    .setsu-outer-label {
        font-size: 10px;
        letter-spacing: .2em;
        color: var(--muted);
        margin-bottom: 8px;
        font-family: 'DM Mono', monospace;
        padding-left: 2px
    }

    .setsu-outer-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px
    }

    .setsu-badge {
        border-radius: 16px;
        padding: 14px;
        border: 1.5px solid transparent
    }

    .setsu-badge.green {
        background: var(--green-bg);
        border-color: var(--green-b)
    }

    .setsu-badge.red {
        background: var(--red-bg);
        border-color: var(--red-b)
    }

    .setsu-badge.blue {
        background: var(--blue-bg);
        border-color: var(--blue-b)
    }

    .setsu-badge-sub {
        font-size: 9px;
        color: var(--muted);
        letter-spacing: .1em;
        margin-bottom: 4px;
        font-family: 'DM Mono', monospace
    }

    .setsu-badge-val {
        font-size: 15px;
        font-weight: 500
    }

    .setsu-badge.green .setsu-badge-val {
        color: var(--green)
    }

    .setsu-badge.red .setsu-badge-val {
        color: var(--red)
    }

    .setsu-badge.blue .setsu-badge-val {
        color: var(--blue)
    }

    .dbg {
        font-size: 10px;
        color: #e0c0c8;
        text-align: center;
        margin-top: 8px;
        font-family: 'DM Mono', monospace
    }

    .spacer {
        height: env(safe-area-inset-bottom, 32px)
    }

    @keyframes fadeUp {
        from {
            opacity: 0;
            transform:translateY(12px)
        }

        to {
            opacity: 1;
            transform: translateY(0)
        }
    }

    .result.show .badge {
        animation: fadeUp .35s ease both
    }

    .result.show .badge:nth-child(2) {
        animation-delay: .07s
    }
    </style>
</head>
